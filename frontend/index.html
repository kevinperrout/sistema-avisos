<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme Avisos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-light">
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark d-lg-none shadow-sm"
    >
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">Acme Avisos</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mobileMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mobileMenu">
          <ul class="navbar-nav ms-auto" id="navMobile"></ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row flex-nowrap">
        <aside
          id="sidebar"
          class="col-12 col-lg-2 col-md-3 bg-dark text-white p-4 d-none d-lg-flex flex-column justify-content-between min-vh-100 shadow"
        >
          <div>
            <h3 class="fw-bold mb-4 text-center">Acme Avisos</h3>

            <div id="userInfo" class="mb-1 text-left d-none">
              <span class="text-white-50">Olá,</span>
              <strong id="userNameDisplay"></strong>
            </div>

            <nav class="nav flex-column" id="navDesktop">
              <a href="/" class="btn btn-primary mt-3">
                <i class="bi bi-tv"></i>Home
              </a>
              <a href="/tv" class="btn btn-primary mt-3" id="btnTvMode">
                <i class="bi bi-tv"></i>Modo TV
              </a>
              <a href="/login" id="linkLogin" class="btn btn-primary mt-3">
                Entrar
              </a>
            </nav>
          </div>

          <div class="text-center small text-white-50 mt-5">
            <span>&copy; 2025 Acme Inc.</span>
          </div>
        </aside>

        <main class="col px-0 position-relative" id="app">
          <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden"></span>
            </div>
          </div>
        </main>
      </div>
    </div>

        <!-- Modal de login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="loginForm">
            <div class="modal-header">
              <h5 class="modal-title">Identifique-se para iniciar o Quiz</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Fechar"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input
                  id="loginEmail"
                  type="email"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input
                  id="loginSenha"
                  type="password"
                  class="form-control"
                  required
                />
              </div>
              <div id="loginErro" class="text-danger small d-none">
                E-mail ou senha inválidos.
              </div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary">Entrar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
